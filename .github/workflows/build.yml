name: Build CameraSpoofer .deb
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4

    - name: Install Theos (roothide fork)
      run: |
        git clone --recursive https://github.com/roothide/theos.git $HOME/theos
        git -C $HOME/theos submodule update --init --recursive

    - name: Install ldid + dpkg
      run: brew install ldid dpkg

    - name: Build deb
      run: |
        export THEOS=$HOME/theos
        export PATH=$HOME/theos/bin:$PATH
        make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=roothide

    - name: Inspect deb contents
      run: |
        dpkg-deb -R packages/*.deb /tmp/debextract
        find /tmp/debextract -type f
        echo "--- control ---"
        cat /tmp/debextract/DEBIAN/control

    - uses: actions/upload-artifact@v4
      with:
        name: CameraSpoofer-deb
        path: packages/*.deb
        retention-days: 30
